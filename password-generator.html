<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0b0f19;
    --surface:  #141927;
    --border:   #1e2a3d;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --accent:   #38bdf8;
    --green:    #4ade80;
    --yellow:   #facc15;
    --red:      #f87171;
    --radius:   14px;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 0 0 1px rgba(56,189,248,.08), 0 24px 48px rgba(0,0,0,.5);
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--text);
  }
  .header p {
    font-size: .78rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Password output */
  .output-wrap {
    position: relative;
    margin-bottom: 10px;
  }
  #password {
    width: 100%;
    padding: 14px 48px 14px 14px;
    background: #0b0f19;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: .06em;
    word-break: break-all;
    min-height: 54px;
    line-height: 1.5;
    cursor: default;
    user-select: all;
    transition: border-color .2s;
  }
  #password:focus { outline: none; border-color: var(--accent); }

  /* Strength bar */
  .strength-wrap {
    display: flex;
    gap: 5px;
    margin-bottom: 20px;
    align-items: center;
  }
  .strength-segments {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  .seg {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    transition: background .3s;
  }
  #strength-label {
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .08em;
    min-width: 56px;
    text-align: right;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Length slider */
  .length-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .length-row label { font-size: .82rem; color: var(--muted); font-weight: 500; }
  #length-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: .9rem;
    color: var(--accent);
    font-weight: 700;
    min-width: 28px;
    text-align: right;
  }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
    margin-bottom: 20px;
    height: 4px;
  }

  /* Checkboxes */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #0b0f19;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    user-select: none;
  }
  .option:hover { border-color: #2e3f58; }
  .option.active { border-color: var(--accent); background: rgba(56,189,248,.06); }
  .option input[type=checkbox] { display: none; }
  .check-icon {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .2s, border-color .2s;
  }
  .option.active .check-icon { background: var(--accent); border-color: var(--accent); }
  .check-icon svg { display: none; }
  .option.active .check-icon svg { display: block; }
  .option span {
    font-size: .8rem;
    font-weight: 500;
    color: var(--muted);
  }
  .option.active span { color: var(--text); }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; }
  button {
    flex: 1;
    padding: 13px 0;
    border: none;
    border-radius: var(--radius);
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    letter-spacing: .03em;
  }
  button:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #0b0f19; }
  .btn-primary:hover { opacity: .88; }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e2a3d;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: .82rem;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🔐 Password Generator</h1>
    <p>Cryptographically secure passwords</p>
  </div>

  <div class="output-wrap">
    <div id="password" title="Click to select"></div>
  </div>

  <div class="strength-wrap">
    <div class="strength-segments">
      <div class="seg" id="seg0"></div>
      <div class="seg" id="seg1"></div>
      <div class="seg" id="seg2"></div>
      <div class="seg" id="seg3"></div>
    </div>
    <span id="strength-label">—</span>
  </div>

  <div class="length-row">
    <label for="length">Length</label>
    <span id="length-display">16</span>
  </div>
  <input type="range" id="length" min="8" max="64" value="16">

  <div class="options">
    <label class="option active" id="opt-upper">
      <input type="checkbox" id="upper" checked>
      <span class="check-icon">
        <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
          <path d="M1 3.5L3.5 6L8 1" stroke="#0b0f19" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span>A–Z</span>
    </label>
    <label class="option active" id="opt-lower">
      <input type="checkbox" id="lower" checked>
      <span class="check-icon">
        <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
          <path d="M1 3.5L3.5 6L8 1" stroke="#0b0f19" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span>a–z</span>
    </label>
    <label class="option active" id="opt-number">
      <input type="checkbox" id="number" checked>
      <span class="check-icon">
        <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
          <path d="M1 3.5L3.5 6L8 1" stroke="#0b0f19" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span>0–9</span>
    </label>
    <label class="option active" id="opt-symbol">
      <input type="checkbox" id="symbol" checked>
      <span class="check-icon">
        <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
          <path d="M1 3.5L3.5 6L8 1" stroke="#0b0f19" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span>!@#$</span>
    </label>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="generatePassword()">Generate</button>
    <button class="btn-secondary" onclick="copyPassword()">Copy</button>
  </div>
</div>

<div id="toast">Copied to clipboard</div>

<script>
  const CHARS = {
    upper:  'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:  'abcdefghijklmnopqrstuvwxyz',
    number: '0123456789',
    symbol: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  // Rejection-sampling RNG — eliminates modulo bias
  function randomIndex(max) {
    const limit = Math.floor(0x100000000 / max) * max;
    const buf = new Uint32Array(1);
    let r;
    do { crypto.getRandomValues(buf); r = buf[0]; } while (r >= limit);
    return r % max;
  }

  function getEnabled() {
    return Object.keys(CHARS).filter(k => document.getElementById(k).checked);
  }

  function generatePassword() {
    const enabled = getEnabled();
    if (!enabled.length) { showToast('Select at least one character type'); return; }

    const length = parseInt(document.getElementById('length').value);
    const pool = enabled.map(k => CHARS[k]).join('');

    // Guarantee at least one character from each enabled type
    const required = enabled.map(k => CHARS[k][randomIndex(CHARS[k].length)]);
    const rest = Array.from({ length: length - required.length },
                            () => pool[randomIndex(pool.length)]);

    // Fisher-Yates shuffle
    const arr = [...required, ...rest];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = randomIndex(i + 1);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }

    const password = arr.join('');
    document.getElementById('password').textContent = password;
    updateStrength(password, enabled);
  }

  function updateStrength(pw, enabled) {
    // Entropy bits = log2(pool size) * length
    const poolSize = enabled.reduce((acc, k) => acc + CHARS[k].length, 0);
    const entropy = Math.log2(poolSize) * pw.length;

    let level, label, color;
    if      (entropy < 40)  { level = 1; label = 'Weak';   color = 'var(--red)'; }
    else if (entropy < 60)  { level = 2; label = 'Fair';   color = 'var(--yellow)'; }
    else if (entropy < 80)  { level = 3; label = 'Strong'; color = 'var(--green)'; }
    else                    { level = 4; label = 'Great';  color = 'var(--green)'; }

    for (let i = 0; i < 4; i++) {
      const seg = document.getElementById('seg' + i);
      seg.style.background = i < level ? color : 'var(--border)';
    }
    const lbl = document.getElementById('strength-label');
    lbl.textContent = label;
    lbl.style.color = color;
  }

  async function copyPassword() {
    const pw = document.getElementById('password').textContent;
    if (!pw) return;
    try {
      await navigator.clipboard.writeText(pw);
      showToast('Copied to clipboard ✓');
    } catch {
      // Fallback for older browsers
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(document.getElementById('password'));
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand('copy');
      sel.removeAllRanges();
      showToast('Copied ✓');
    }
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Slider feedback
  const slider = document.getElementById('length');
  const display = document.getElementById('length-display');
  slider.addEventListener('input', () => {
    display.textContent = slider.value;
    generatePassword();
  });

  // Toggle option styling
  ['upper','lower','number','symbol'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      const opt = document.getElementById('opt-' + id);
      opt.classList.toggle('active', document.getElementById(id).checked);
      generatePassword();
    });
  });

  // Click on password div to re-select
  document.getElementById('password').addEventListener('click', function() {
    const sel = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(this);
    sel.removeAllRanges();
    sel.addRange(range);
  });

  generatePassword();
</script>
</body>
</html>
